name: Windows Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '已由 Prepare Release 创建的 annotated tag，例如 v0.2.3'
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: windows-release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  windows-x64:
    runs-on: windows-latest
    timeout-minutes: 180
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG_INPUT: ${{ inputs.tag }}
      RELEASE_PYTHON_VERSION: '3.12'
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\tooling\packaging\build\vcpkg-binary-cache
    steps:
      - name: Check out the exact release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Validate tag, source commit, version, and rerun state
        shell: pwsh
        run: |
          $Tag = $env:RELEASE_TAG_INPUT.Trim()
          if ($Tag -ne $env:RELEASE_TAG_INPUT) {
            throw 'The tag must not contain leading or trailing whitespace.'
          }
          if ($Tag -notmatch '^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$') {
            throw "Invalid tag '$Tag'. Use vMAJOR.MINOR.PATCH."
          }
          $Version = $Tag.Substring(1)
          if ($env:GITHUB_REF -ne "refs/tags/$Tag") {
            throw "This workflow must be dispatched with --ref $Tag; got $env:GITHUB_REF."
          }

          $GitFetchArgs = @('fetch', 'origin', '--tags')
          & git @GitFetchArgs
          if ($LASTEXITCODE -ne 0) { throw 'Unable to fetch release tags.' }

          $TagTypeArgs = @('cat-file', '-t', "refs/tags/$Tag")
          $TagType = (& git @TagTypeArgs).Trim()
          if ($LASTEXITCODE -ne 0 -or $TagType -ne 'tag') {
            throw "$Tag must exist as an annotated tag; it will not be created or moved here."
          }
          $ResolveTagArgs = @('rev-parse', "$Tag^{commit}")
          $TagCommit = (& git @ResolveTagArgs).Trim()
          if ($LASTEXITCODE -ne 0) { throw "Unable to resolve $Tag to a commit." }
          $ResolveHeadArgs = @('rev-parse', 'HEAD')
          $HeadCommit = (& git @ResolveHeadArgs).Trim()
          if ($LASTEXITCODE -ne 0) { throw 'Unable to resolve checked-out HEAD.' }
          if ($HeadCommit -ne $TagCommit) {
            throw "Checked-out HEAD $HeadCommit does not equal $Tag commit $TagCommit."
          }
          if ($env:GITHUB_SHA -ne $TagCommit) {
            throw "Workflow source SHA $env:GITHUB_SHA does not equal $Tag commit $TagCommit."
          }

          $StatusArgs = @('status', '--porcelain=v1')
          $Dirty = @(& git @StatusArgs)
          if ($LASTEXITCODE -ne 0 -or $Dirty.Count -ne 0) {
            throw 'The release checkout must be clean before building.'
          }

          & pwsh '-File' '.\scripts\check-version-consistency.ps1' '-ExpectedVersion' $Version
          if ($LASTEXITCODE -ne 0) {
            throw "$Tag does not contain project version $Version."
          }

          $TagMessageArgs = @('for-each-ref', '--format=%(contents)', "refs/tags/$Tag")
          $TagMessage = @(& git @TagMessageArgs)
          if ($LASTEXITCODE -ne 0) { throw "Unable to read $Tag metadata." }
          $Markers = @($TagMessage | Where-Object { $_ -match '^prerelease=(true|false)$' })
          if ($Markers.Count -ne 1) {
            throw "$Tag must contain exactly one prerelease=true|false marker."
          }
          $Prerelease = $Markers[0].Substring('prerelease='.Length)

          $ReleaseListArgs = @(
            'release', 'list', '--repo', $env:GITHUB_REPOSITORY,
            '--limit', '1000', '--json', 'tagName,isDraft,isPrerelease'
          )
          $ReleaseListJson = & gh @ReleaseListArgs
          if ($LASTEXITCODE -ne 0) { throw 'Unable to query existing releases.' }
          $MatchingReleases = @(
            $ReleaseListJson |
              ConvertFrom-Json |
              Where-Object { $_.tagName -eq $Tag }
          )
          if ($MatchingReleases.Count -gt 1) {
            throw "Found multiple releases for $Tag."
          }
          if ($MatchingReleases.Count -eq 1) {
            if (-not $MatchingReleases[0].isDraft) {
              throw "Published Release $Tag already exists and will never be overwritten."
            }
            if ($MatchingReleases[0].isPrerelease.ToString().ToLowerInvariant() -ne $Prerelease) {
              throw "Draft Release $Tag prerelease state does not match the immutable tag metadata."
            }
          }

          $RulesetCheckArgs = @(
            '-File', './scripts/check-release-tag-ruleset.ps1',
            '-Repository', $env:GITHUB_REPOSITORY,
            '-SummaryPath', $env:GITHUB_STEP_SUMMARY,
            '-Phase', 'Build start'
          )
          & pwsh @RulesetCheckArgs
          if ($LASTEXITCODE -ne 0) { throw 'Release tag ruleset validation failed.' }

          "RELEASE_VERSION=$Version" | Add-Content -LiteralPath $env:GITHUB_ENV
          "RELEASE_TAG=$Tag" | Add-Content -LiteralPath $env:GITHUB_ENV
          "RELEASE_TAG_COMMIT=$TagCommit" | Add-Content -LiteralPath $env:GITHUB_ENV
          "RELEASE_PRERELEASE=$Prerelease" | Add-Content -LiteralPath $env:GITHUB_ENV

      - name: Restore LGPL media wheel cache
        id: restore_media_wheel_cache
        uses: actions/cache/restore@v4
        with:
          path: tooling/packaging/dist/media-wheel
          key: >-
            media-wheel-${{ runner.os }}-${{ runner.arch }}-python-${{ env.RELEASE_PYTHON_VERSION }}-${{ hashFiles('scripts/build-media-wheel.ps1', 'tooling/packaging/media-runtime/vcpkg.json') }}

      - name: Check out pinned vcpkg baseline
        if: steps.restore_media_wheel_cache.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          ref: db4723bd0a99eab031f1a3dee4336dca43049c87
          path: tooling/packaging/build/vcpkg

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ env.RELEASE_PYTHON_VERSION }}
          enable-cache: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Restore vcpkg binary cache
        if: steps.restore_media_wheel_cache.outputs.cache-hit != 'true'
        id: restore_vcpkg_cache
        uses: actions/cache/restore@v4
        with:
          path: tooling/packaging/build/vcpkg-binary-cache
          key: vcpkg-windows-x64-${{ hashFiles('tooling/packaging/media-runtime/vcpkg.json') }}

      - name: Bootstrap pinned vcpkg
        if: steps.restore_media_wheel_cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force $env:VCPKG_DEFAULT_BINARY_CACHE | Out-Null
          & .\tooling\packaging\build\vcpkg\bootstrap-vcpkg.bat '-disableMetrics'
          if ($LASTEXITCODE -ne 0) { throw 'Unable to bootstrap pinned vcpkg.' }

      - run: npm ci
        working-directory: apps/web

      - run: uv sync --project apps/sidecar --extra asr --extra desktop --extra dev --locked

      - name: Select release Python runtime
        shell: pwsh
        run: |
          $Python = (Resolve-Path 'apps\sidecar\.venv\Scripts\python.exe').Path
          "CAPTIONNEST_BUILD_PYTHON=$Python" | Add-Content -LiteralPath $env:GITHUB_ENV

      - name: Build LGPL media wheel
        if: steps.restore_media_wheel_cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          .\scripts\build-media-wheel.ps1 `
            -VcpkgRoot 'tooling\packaging\build\vcpkg' `
            -PythonExecutable $env:CAPTIONNEST_BUILD_PYTHON

      - name: Install and verify LGPL media wheel
        shell: pwsh
        run: |
          .\scripts\install-media-wheel.ps1 `
            -PythonExecutable $env:CAPTIONNEST_BUILD_PYTHON

      - name: Save LGPL media wheel cache
        if: steps.restore_media_wheel_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: tooling/packaging/dist/media-wheel
          key: >-
            media-wheel-${{ runner.os }}-${{ runner.arch }}-python-${{ env.RELEASE_PYTHON_VERSION }}-${{ hashFiles('scripts/build-media-wheel.ps1', 'tooling/packaging/media-runtime/vcpkg.json') }}

      - name: Save vcpkg binary cache
        if: >-
          steps.restore_media_wheel_cache.outputs.cache-hit != 'true' &&
          steps.restore_vcpkg_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: tooling/packaging/build/vcpkg-binary-cache
          key: vcpkg-windows-x64-${{ hashFiles('tooling/packaging/media-runtime/vcpkg.json') }}

      - name: Lint Python
        shell: pwsh
        run: '& $env:CAPTIONNEST_BUILD_PYTHON -m ruff check .'
        working-directory: apps/sidecar

      - name: Lint repository tooling
        shell: pwsh
        run: '& $env:CAPTIONNEST_BUILD_PYTHON -m ruff check --config apps/sidecar/pyproject.toml tooling'

      - name: Test Python with release media runtime
        shell: pwsh
        run: '& $env:CAPTIONNEST_BUILD_PYTHON -m pytest'

      - run: npm run lint
        working-directory: apps/web

      - run: cargo fmt --manifest-path apps/desktop/Cargo.toml --check

      - name: Verify every project and lock-file version
        shell: pwsh
        run: .\scripts\check-version-consistency.ps1 -ExpectedVersion $env:RELEASE_VERSION

      - name: Build NSIS and checksum
        shell: pwsh
        run: .\scripts\build-desktop.ps1 -PythonExecutable $env:CAPTIONNEST_BUILD_PYTHON

      - name: Stage and verify release candidate
        shell: pwsh
        run: |
          $Stage = 'tooling\packaging\dist\release-candidate'
          if (Test-Path -LiteralPath $Stage) {
            Remove-Item -LiteralPath $Stage -Recurse -Force
          }
          New-Item -ItemType Directory -Path $Stage -Force | Out-Null
          $InstallerName = "CaptionNest_$env:RELEASE_VERSION`_x64-setup.exe"
          $ChecksumName = "$InstallerName.sha256"
          $Nsis = 'apps\desktop\target\x86_64-pc-windows-msvc\release\bundle\nsis'
          Copy-Item -LiteralPath (Join-Path $Nsis $InstallerName) -Destination $Stage
          Copy-Item -LiteralPath (Join-Path $Nsis $ChecksumName) -Destination $Stage
          Copy-Item -LiteralPath 'tooling\packaging\dist\FFMPEG_BUILD_INFO.txt' -Destination $Stage
          Copy-Item `
            -LiteralPath 'tooling\packaging\dist\media-wheel\MEDIA_WHEEL_PROVENANCE.json' `
            -Destination $Stage

          $ExpectedNames = @(
            $InstallerName,
            $ChecksumName,
            'FFMPEG_BUILD_INFO.txt',
            'MEDIA_WHEEL_PROVENANCE.json'
          )
          $Files = @(Get-ChildItem -LiteralPath $Stage -File)
          $ActualNames = @($Files.Name | Sort-Object)
          if (($ActualNames -join "`n") -ne (($ExpectedNames | Sort-Object) -join "`n")) {
            throw "Release candidate contents differ from the four expected assets: $($ActualNames -join ', ')."
          }
          if (@($Files | Where-Object { $_.Length -le 0 }).Count -ne 0) {
            throw 'Release candidate contains an empty asset.'
          }
          $InstallerPath = Join-Path $Stage $InstallerName
          $ActualHash = (Get-FileHash -LiteralPath $InstallerPath -Algorithm SHA256).Hash.ToLowerInvariant()
          $ChecksumLine = (Get-Content -LiteralPath (Join-Path $Stage $ChecksumName) -Raw).Trim()
          if ($ChecksumLine -ne "$ActualHash  $InstallerName") {
            throw 'Installer checksum file does not match the exact staged installer.'
          }

      - name: Smoke-test the exact installer
        timeout-minutes: 8
        shell: pwsh
        run: |
          $InstallerPath = "tooling\packaging\dist\release-candidate\CaptionNest_$env:RELEASE_VERSION`_x64-setup.exe"
          .\scripts\smoke-test-installer.ps1 `
            -InstallerPath $InstallerPath `
            -ExpectedVersion $env:RELEASE_VERSION

      - name: Upload validated workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: captionnest-windows-x64-${{ env.RELEASE_TAG }}
          if-no-files-found: error
          path: tooling/packaging/dist/release-candidate/*

      - name: Attest the final Windows installer
        id: attest_installer
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: tooling/packaging/dist/release-candidate/CaptionNest_${{ env.RELEASE_VERSION }}_x64-setup.exe

      - name: Record build provenance
        shell: pwsh
        env:
          ATTESTATION_ID: ${{ steps.attest_installer.outputs.attestation-id }}
          ATTESTATION_URL: ${{ steps.attest_installer.outputs.attestation-url }}
        run: |
          if (-not $env:ATTESTATION_ID -or -not $env:ATTESTATION_URL) {
            throw 'actions/attest did not return an attestation ID and URL.'
          }
          @"
          ## Windows installer build provenance

          - Attestation ID: ``$env:ATTESTATION_ID``
          - Attestation URL: $env:ATTESTATION_URL
          - Source/tag commit: ``$env:RELEASE_TAG_COMMIT``
          "@ | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY

      - name: Create or resume draft, verify assets, and publish
        shell: pwsh
        env:
          ATTESTATION_URL: ${{ steps.attest_installer.outputs.attestation-url }}
        run: |
          $Stage = 'tooling\packaging\dist\release-candidate'
          $InstallerName = "CaptionNest_$env:RELEASE_VERSION`_x64-setup.exe"
          $AssetNames = @(
            $InstallerName,
            "$InstallerName.sha256",
            'FFMPEG_BUILD_INFO.txt',
            'MEDIA_WHEEL_PROVENANCE.json'
          )
          $AssetPaths = @($AssetNames | ForEach-Object { Join-Path $Stage $_ })
          $NotesPath = Join-Path $env:RUNNER_TEMP 'captionnest-release-notes.md'
          @"
          CaptionNest 是一个面向 Windows 的本地优先双语字幕应用。

          Windows 10/11 x64 用户请下载 ``$InstallerName``。

          ### 可验证发布

              gh attestation verify .\$InstallerName -R $env:GITHUB_REPOSITORY
              gh release verify $env:RELEASE_TAG -R $env:GITHUB_REPOSITORY
              gh release verify-asset $env:RELEASE_TAG .\$InstallerName -R $env:GITHUB_REPOSITORY

          Build provenance: $env:ATTESTATION_URL

          > 本版本尚未配置 Windows Authenticode 代码签名，首次安装可能出现 Microsoft Defender SmartScreen 提示。Build provenance 证明构建来源和字节摘要，不等于恶意软件扫描、SBOM 或 Windows 发布者信誉。

          ``FFMPEG_BUILD_INFO.txt`` 与 ``MEDIA_WHEEL_PROVENANCE.json`` 记录 LGPL 媒体运行时的许可证门禁、固定版本和构建来源。
          "@ | Set-Content -LiteralPath $NotesPath -Encoding utf8

          $ListArgs = @(
            'release', 'list', '--repo', $env:GITHUB_REPOSITORY,
            '--limit', '1000', '--json', 'tagName,isDraft,isPrerelease'
          )
          $ReleaseListJson = & gh @ListArgs
          if ($LASTEXITCODE -ne 0) { throw 'Unable to refresh release state before creating a draft.' }
          $TagReleases = @(
            $ReleaseListJson |
              ConvertFrom-Json |
              Where-Object { $_.tagName -eq $env:RELEASE_TAG }
          )
          if ($TagReleases.Count -gt 1) { throw "Found multiple releases for $env:RELEASE_TAG." }
          if ($TagReleases.Count -eq 1 -and -not $TagReleases[0].isDraft) {
            throw "Published Release $env:RELEASE_TAG appeared during the build; it will not be overwritten."
          }

          if ($TagReleases.Count -eq 0) {
            $CreateArgs = @(
              'release', 'create', $env:RELEASE_TAG,
              '--repo', $env:GITHUB_REPOSITORY,
              '--draft', '--verify-tag',
              '--title', "CaptionNest $env:RELEASE_TAG",
              '--notes-file', $NotesPath
            )
            if ($env:RELEASE_PRERELEASE -eq 'true') { $CreateArgs += '--prerelease' }
            & gh @CreateArgs
            if ($LASTEXITCODE -ne 0) { throw "Unable to create Draft Release $env:RELEASE_TAG." }
          } else {
            if ($TagReleases[0].isPrerelease.ToString().ToLowerInvariant() -ne $env:RELEASE_PRERELEASE) {
              throw 'Existing Draft Release prerelease state changed during the build.'
            }
            $EditArgs = @(
              'release', 'edit', $env:RELEASE_TAG,
              '--repo', $env:GITHUB_REPOSITORY,
              '--draft',
              '--title', "CaptionNest $env:RELEASE_TAG",
              '--notes-file', $NotesPath,
              "--prerelease=$env:RELEASE_PRERELEASE"
            )
            & gh @EditArgs
            if ($LASTEXITCODE -ne 0) { throw "Unable to refresh Draft Release $env:RELEASE_TAG." }
          }

          $UploadArgs = @(
            'release', 'upload', $env:RELEASE_TAG,
            '--repo', $env:GITHUB_REPOSITORY,
            '--clobber'
          ) + $AssetPaths
          & gh @UploadArgs
          if ($LASTEXITCODE -ne 0) { throw 'Unable to upload every validated release asset.' }

          $ViewArgs = @(
            'release', 'view', $env:RELEASE_TAG,
            '--repo', $env:GITHUB_REPOSITORY,
            '--json', 'apiUrl,tagName,isDraft,isPrerelease'
          )
          $DraftJson = & gh @ViewArgs
          if ($LASTEXITCODE -ne 0) { throw 'Unable to query the uploaded Draft Release.' }
          $Draft = $DraftJson | ConvertFrom-Json
          if ($Draft.tagName -ne $env:RELEASE_TAG -or -not $Draft.isDraft) {
            throw 'Expected exactly one Draft Release before publication.'
          }
          if ($Draft.apiUrl -notmatch '/releases/(?<id>\d+)$') {
            throw 'Draft Release API URL does not contain a numeric release ID.'
          }
          $ReleaseId = $Matches.id
          $GetReleaseArgs = @(
            'api', "repos/$env:GITHUB_REPOSITORY/releases/$ReleaseId"
          )
          $ReleaseJson = & gh @GetReleaseArgs
          if ($LASTEXITCODE -ne 0) { throw 'Unable to inspect Draft Release assets.' }
          $RemoteAssets = @(($ReleaseJson | ConvertFrom-Json).assets)
          $RemoteNames = @($RemoteAssets.name | Sort-Object)
          if (($RemoteNames -join "`n") -ne (($AssetNames | Sort-Object) -join "`n")) {
            throw "Draft Release assets differ from the exact expected set: $($RemoteNames -join ', ')."
          }
          foreach ($Path in $AssetPaths) {
            $File = Get-Item -LiteralPath $Path
            $Remote = @($RemoteAssets | Where-Object { $_.name -eq $File.Name })
            if ($Remote.Count -ne 1 -or $Remote[0].size -ne $File.Length) {
              throw "Uploaded size does not match $($File.Name)."
            }
            $LocalDigest = "sha256:$((Get-FileHash -LiteralPath $File.FullName -Algorithm SHA256).Hash.ToLowerInvariant())"
            if ($Remote[0].digest -ne $LocalDigest) {
              throw "Uploaded digest does not match $($File.Name)."
            }
          }

          # Re-read both protections immediately before publish. The initial validation
          # may be up to 180 minutes old and cannot establish the final Release identity.
          $RulesetCheckArgs = @(
            '-File', './scripts/check-release-tag-ruleset.ps1',
            '-Repository', $env:GITHUB_REPOSITORY,
            '-SummaryPath', $env:GITHUB_STEP_SUMMARY,
            '-Phase', 'Immediately before publish'
          )
          & pwsh @RulesetCheckArgs
          if ($LASTEXITCODE -ne 0) {
            throw 'Release tag protection disappeared or became unsafe; refusing to publish.'
          }

          $RemoteTagRef = "refs/tags/$env:RELEASE_TAG"
          $RemotePeeledRef = "$RemoteTagRef^{}"
          $LsRemoteArgs = @(
            'ls-remote', '--exit-code', 'origin', $RemoteTagRef, $RemotePeeledRef
          )
          $RemoteTagLines = @(& git @LsRemoteArgs)
          if ($LASTEXITCODE -ne 0) { throw 'Unable to resolve the remote release tag before publish.' }
          $RemotePeeledEntries = @(
            $RemoteTagLines |
              ForEach-Object {
                $Fields = $_ -split "`t", 2
                if ($Fields.Count -eq 2 -and $Fields[1] -eq $RemotePeeledRef) { $Fields[0] }
              }
          )
          if ($RemotePeeledEntries.Count -ne 1) {
            throw 'Remote release tag must still be an annotated tag with exactly one peeled commit.'
          }
          $RemoteTagCommit = $RemotePeeledEntries[0].ToLowerInvariant()
          if (
            $RemoteTagCommit -ne $env:RELEASE_TAG_COMMIT -or
            $RemoteTagCommit -ne $env:GITHUB_SHA
          ) {
            throw "Remote tag moved to $RemoteTagCommit after build start; refusing to publish."
          }

          $PublishRequest = @{ draft = $false } | ConvertTo-Json -Compress
          $PublishArgs = @(
            'api', '--method', 'PATCH',
            "repos/$env:GITHUB_REPOSITORY/releases/$ReleaseId",
            '--input', '-'
          )
          $PublishedJson = $PublishRequest | & gh @PublishArgs
          if ($LASTEXITCODE -ne 0) { throw "Unable to publish Release $env:RELEASE_TAG." }
          $Published = $PublishedJson | ConvertFrom-Json
          if ($Published.draft -or -not $Published.immutable) {
            throw 'GitHub did not confirm a published immutable Release.'
          }
          @"
          ## Immutable Release published

          - Release: $($Published.html_url)
          - Tag/commit: ``$env:RELEASE_TAG`` / ``$env:RELEASE_TAG_COMMIT``
          - Assets: $($AssetNames -join ', ')
          "@ | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY
